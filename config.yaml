annotation_task_name: "Product Category Annotation"

# ── Data ─────────────────────────────────────────────────────────────────────
data_files:
  - data/annotations_input.jsonl

item_properties:
  id_key: "id"
  text_key: "id"   # non-URL field so POTATO doesn't display the URL as text

output_annotation_dir: "annotations/"
output_annotation_format: "json"

# ── Crowdsourcing parameters ──────────────────────────────────────────────────
max_annotations_per_item: 3   # each image gets 3 independent annotations
max_annotations_per_user: 25  # each worker sees 25 images

# ── Image display ─────────────────────────────────────────────────────────────
instance_display:
  fields:
    - key: image_url
      type: image
      display_options:
        max_width: 450
        max_height: 600

# ── Survey flow ───────────────────────────────────────────────────────────────
phases:
  order:
    - instructions
    - annotation
    - poststudy

  instructions:
    type: instructions
    file: surveyflow/intro.html

  poststudy:
    type: poststudy
    file: surveyflow/exit_survey.jsonl

# ── UI ───────────────────────────────────────────────────────────────────────
base_html_template: "default"
site_file: "default"
jumping_to_id_disabled: true
hide_navbar: true

# ── Login / Prolific ──────────────────────────────────────────────────────────
# Workers arrive via:
#   http://YOUR-EC2-IP:8000/?PROLIFIC_PID={%PROLIFIC_PID%}&STUDY_ID={%STUDY_ID%}&SESSION_ID={%SESSION_ID%}
require_password: false

login:
  type: "url_direct"
  url_argument: "PROLIFIC_PID"
  auto_redirect_on_completion: true
  auto_redirect_delay: 1000

prolific:
  completion_code: "C1GXQDAF"
  sandbox_mode: false

# ── Annotation schemes (top-level required by POTATO) ─────────────────────────
annotation_schemes:
  - annotation_type: radio
    name: product_category
    description: "What is the primary product category advertised in this ad?"
    labels:
      - "Alcohol"
      - "Business and Industrial"
      - "City or Region"
      - "Clothing and Accessories"
      - "Collectables and Antiques"
      - "Computer Software"
      - "Consumer Electronics"
      - "Consumer Packaged Goods and Durable Goods"
      - "Cosmetic Services"
      - "Culture and Fine Arts"
      - "Debated Sensitive Social Issue"
      - "Dieting and Weight loss"
      - "Education and Careers"
      - "Events and Performances"
      - "Family and Parenting"
      - "Finance and Insurance"
      - "Fitness Activities and Sporting Goods"
      - "Food and Beverage Services"
      - "Gifts and Holiday Items"
      - "Health and Medical Services"
      - "Home and Garden Services"
      - "Legal Services"
      - "Media"
      - "Metals"
      - "Non-Profits"
      - "Oil and Gas"
      - "Personal/Consumer Telecom"
      - "Pet Ownership"
      - "Pharmaceuticals"
      - "Politics"
      - "Real Estate"
      - "Religion and Spirituality"
      - "Retail"
      - "Sexual Health"
      - "Tobacco"
      - "Travel and Tourism"
      - "Vehicles"
      - "Weapons and Ammunition"
    required: true
    horizontal: false

  - annotation_type: text
    name: comment
    description: "Optional: notes or anything you'd like to flag about this ad."
    required: false
    placeholder: "e.g. image is unclear, ad spans multiple categories, ..."

  - annotation_type: multiselect
    name: not_complete_ad
    description: "Check if applicable"
    labels:
      - "Not a single and complete ad"
    required: false

  - annotation_type: multiselect
    name: ambiguous_category
    description: "Check if applicable"
    labels:
      - "Category is very ambiguous"
    required: false

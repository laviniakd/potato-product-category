annotation_task_name: "Product Category Annotation"

# ── Data ─────────────────────────────────────────────────────────────────────
data_files:
  - data/annotations_input.jsonl

item_properties:
  id_key: "id"
  text_key: "image_url"
  fields:
    key: image_url
    type: image

output_annotation_dir: "annotations/"
output_annotation_format: "json"

# ── Crowdsourcing parameters ──────────────────────────────────────────────────
max_annotations_per_item: 3   # each image gets 3 independent annotations
max_annotations_per_user: 25  # each worker sees 25 images

# ── UI ───────────────────────────────────────────────────────────────────────
task_layout: "templates/task.html"
base_html_template: "default"
site_file: "default"
jumping_to_id_disabled: true
hide_navbar: true

# ── Login / Prolific ──────────────────────────────────────────────────────────
# Workers arrive via:
#   http://YOUR-EC2-IP:8000/?PROLIFIC_PID={%PROLIFIC_PID%}&STUDY_ID={%STUDY_ID%}&SESSION_ID={%SESSION_ID%}
require_password: false

login:
  type: "url_direct"
  url_argument: "PROLIFIC_PID"
  auto_redirect_on_completion: true
  auto_redirect_delay: 1000

prolific:
  completion_code: "C1GXQDAF"   # paste your Prolific completion code here before launch
  sandbox_mode: false

# ── Annotation scheme ─────────────────────────────────────────────────────────
annotation_schemes:
  - annotation_type: radio
    name: product_category
    description: "What is the primary product category advertised in this ad?"
    labels:
      - "Dieting and Weight loss"
      - "Consumer Electronics"
      - "Pharmaceuticals"
      - "Consumer Packaged Goods and Durable Goods"
      - "Fitness Activities and Sporting Goods"
      - "Finance and Insurance"
      - "Food and Beverage Services"
      - "Health and Medical Services"
      - "Retail"
      - "Debated Sensitive Social Issue"
      - "Sexual Health"
      - "Home and Garden Services"
      - "Travel and Tourism"
      - "Gifts and Holiday Items"
      - "Clothing and Accessories"
      - "Weapons and Ammunition"
      - "Tobacco"
      - "Real Estate"
      - "Business and Industrial"
      - "Non-Profits"
      - "Collectables and Antiques"
      - "Alcohol"
      - "Personal/Consumer Telecom"
      - "Media"
      - "Family and Parenting"
      - "Politics"
      - "Computer Software"
      - "Cosmetic Services"
      - "Legal Services"
      - "Religion and Spirituality"
      - "Metals"
      - "Culture and Fine Arts"
      - "Oil and Gas"
      - "Pet Ownership"
      - "Events and Performances"
      - "Vehicles"
      - "Education and Careers"
      - "City or Region"
    required: true
    horizontal: false

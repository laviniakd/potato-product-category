<!-- Product category annotation template.
     Called once per image. Instance fields available via instance_obj.*
     Fields: id, image_url, magazine, decade
     Note: the image itself is rendered by instance_display in config.yaml. -->

<!-- Provenance (magazine + decade shown under the image) -->
<p style="text-align: center; font-size: 12px; color: #999; margin-top: 4px; margin-bottom: 0;">
  {{ instance.magazine }} &middot; {{ instance.decade }}s
</p>
